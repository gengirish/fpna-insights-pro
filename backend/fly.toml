app = "fpna-insights-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  [build.args]

[env]
  PORT = "8080"
  DEBUG = "false"
  OPENROUTER_MODEL = "google/gemini-2.0-flash-001"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/api/v1/health"
